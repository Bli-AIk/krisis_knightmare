name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open or finalize release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build release assets
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync zip unzip

      - name: Validate tag version
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail

          manifest_version="$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("mod.json").read_text(encoding="utf-8")
          match = re.search(r'(?m)^\s*"version"\s*:\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not find version in mod.json")
          print(match.group(1))
          PY
          )"

          if [ "$manifest_version" != "$RELEASE_TAG" ]; then
            echo "mod.json version ($manifest_version) does not match tag ($RELEASE_TAG)" >&2
            exit 1
          fi

      - name: Build standalone packages
        run: ./build_standalone.sh

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          files=(
            dist/krisis-knightmare-release.love
            dist/krisis-knightmare-debug.love
            dist/krisis-knightmare-release-win64.zip
            dist/krisis-knightmare-debug-win64.zip
          )

          for file in "${files[@]}"; do
            test -s "$file"
          done

          unzip -t dist/krisis-knightmare-release.love >/dev/null
          unzip -t dist/krisis-knightmare-debug.love >/dev/null
          unzip -t dist/krisis-knightmare-release-win64.zip >/dev/null
          unzip -t dist/krisis-knightmare-debug-win64.zip >/dev/null

          unzip -l dist/krisis-knightmare-release-win64.zip | grep -F "KRISIS-KNIGHTMARE-release.exe"
          unzip -l dist/krisis-knightmare-debug-win64.zip | grep -F "KRISIS-KNIGHTMARE-debug.exe"

      - name: Generate and verify SHA-256 manifest
        run: |
          set -euo pipefail

          .github/scripts/generate_sha256sums.sh dist
          test -s dist/SHA256SUMS
          test "$(wc -l < dist/SHA256SUMS)" -eq 4
          (cd dist && sha256sum -c SHA256SUMS)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: krisis-knightmare-${{ needs.release-please.outputs.tag_name }}
          path: |
            dist/krisis-knightmare-release.love
            dist/krisis-knightmare-debug.love
            dist/krisis-knightmare-release-win64.zip
            dist/krisis-knightmare-debug-win64.zip
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail

          title="KRISIS KNIGHTMARE ${RELEASE_TAG}"
          files=(
            dist/krisis-knightmare-release.love
            dist/krisis-knightmare-debug.love
            dist/krisis-knightmare-release-win64.zip
            dist/krisis-knightmare-debug-win64.zip
            dist/SHA256SUMS
          )
          release_flags=()

          version="${RELEASE_TAG#v}"
          major="${version%%.*}"
          if [[ "$major" =~ ^[0-9]+$ ]] && [ "$major" -lt 1 ]; then
            release_flags+=(--prerelease)
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$title" --generate-notes "${release_flags[@]}"
          fi

          gh release view "$RELEASE_TAG" --json body --jq '.body' > existing_release_notes.md
          .github/scripts/append_release_security_notes.sh \
            existing_release_notes.md release_notes_with_security.md
          gh release edit "$RELEASE_TAG" \
            --title "$title" \
            --notes-file release_notes_with_security.md \
            "${release_flags[@]}"

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
