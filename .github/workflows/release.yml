name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify required submodules
        run: |
          set -euo pipefail

          git submodule status --recursive
          test -s libraries/langLib_zh_hans/lib.lua
          test -s libraries/langLib_zh_hans/assets/fonts/lang/zh_hans/main.ttf
          test -s libraries/langLib_zh_hans/assets/fonts/lang/zh_hans/main_mono.ttf
          test -s libraries/wave-video-debug/lib.lua

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync zip unzip

      - name: Validate tag version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          manifest_version="$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("mod.json").read_text(encoding="utf-8")
          match = re.search(r'(?m)^\s*"version"\s*:\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not find version in mod.json")
          print(match.group(1))
          PY
          )"

          if [ "$manifest_version" != "$tag" ]; then
            echo "mod.json version ($manifest_version) does not match tag ($tag)" >&2
            exit 1
          fi

      - name: Build standalone packages
        run: ./build_standalone.sh

      - name: Build mod package
        run: ./.github/scripts/build_mod.sh

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          files=(
            dist/krisis-knightmare-release.love
            dist/krisis-knightmare-debug.love
            dist/krisis-knightmare-release-win64.zip
            dist/krisis-knightmare-debug-win64.zip
            dist/krisis-knightmare-mod.zip
          )

          for file in "${files[@]}"; do
            test -s "$file"
          done

          unzip -t dist/krisis-knightmare-release.love >/dev/null
          unzip -t dist/krisis-knightmare-debug.love >/dev/null
          unzip -t dist/krisis-knightmare-release-win64.zip >/dev/null
          unzip -t dist/krisis-knightmare-debug-win64.zip >/dev/null
          unzip -t dist/krisis-knightmare-mod.zip >/dev/null

          unzip -l dist/krisis-knightmare-release-win64.zip | grep -F "KRISIS-KNIGHTMARE-release.exe"
          unzip -l dist/krisis-knightmare-debug-win64.zip | grep -F "KRISIS-KNIGHTMARE-debug.exe"
          unzip -Z1 dist/krisis-knightmare-mod.zip | grep -Fx "mod.json" >/dev/null

      - name: Generate and verify SHA-256 manifest
        run: |
          set -euo pipefail

          .github/scripts/generate_sha256sums.sh dist
          test -s dist/SHA256SUMS
          test "$(wc -l < dist/SHA256SUMS)" -eq 5
          (cd dist && sha256sum -c SHA256SUMS)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: krisis-knightmare-${{ github.ref_name || github.sha }}
          path: |
            dist/krisis-knightmare-release.love
            dist/krisis-knightmare-debug.love
            dist/krisis-knightmare-release-win64.zip
            dist/krisis-knightmare-debug-win64.zip
            dist/krisis-knightmare-mod.zip
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Generate release notes
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/generate_release_notes.sh "$GITHUB_REF_NAME" release_notes.md

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="KRISIS KNIGHTMARE ${GITHUB_REF_NAME}"
          files=(
            dist/krisis-knightmare-release.love
            dist/krisis-knightmare-debug.love
            dist/krisis-knightmare-release-win64.zip
            dist/krisis-knightmare-debug-win64.zip
            dist/krisis-knightmare-mod.zip
            dist/SHA256SUMS
          )
          release_flags=()

          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          if [[ "$major" =~ ^[0-9]+$ ]] && [ "$major" -lt 1 ]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release view "$GITHUB_REF_NAME" --json body --jq '.body' > existing_release_notes.md
            notes_source=existing_release_notes.md
            if [ ! -s "$notes_source" ]; then
              notes_source=release_notes.md
            fi
            .github/scripts/prepare_release_notes.sh \
              "$GITHUB_REF_NAME" "$notes_source" release_notes_with_security.md

            gh release edit "$GITHUB_REF_NAME" \
              --title "$title" \
              --notes-file release_notes_with_security.md \
              "${release_flags[@]}"
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --title "$title" --notes-file release_notes.md "${release_flags[@]}"
          fi
